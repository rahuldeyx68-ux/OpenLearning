<!DOCTYPE html>

<body>
     <!-- Step 2: Graph Container -->
  <div id="calculator" style="width: 1000px; height: 600px;"></div>

  <!-- Step 3: Initialize Graph -->
  <script>
    const elt = document.getElementById('calculator');

    const calculator = Desmos.Geometry(elt);

    // Add a graph equation
    calculator.setExpression({
      id: 'graph1',
      latex: 'y = x^2'
    });
  </script>
</body>
